name: Platform Build Matrix

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build ${{ matrix.target }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: web
            command: flutter build web
          - os: ubuntu-latest
            target: linux
            command: flutter build linux
            setup: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev
          - os: ubuntu-latest
            target: apk
            command: flutter build apk --debug
          - os: macos-latest
            target: ios
            command: flutter build ios --no-codesign
          - os: macos-latest
            target: macos
            command: flutter build macos
          - os: windows-latest
            target: windows
            command: flutter build windows
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.7'
          channel: 'stable'
      - name: Platform setup
        if: matrix.setup
        run: ${{ matrix.setup }}
      - name: Pub get (root package)
        run: flutter pub get
      - name: Pub get (example)
        run: flutter pub get
        working-directory: example
      - name: Build
        run: ${{ matrix.command }}
        working-directory: example
